ekf_filter_node:
    ros__parameters:
        use_sim_time: true

        frequency: 50.0

        sensor_timeout: 0.1
        two_d_mode: true
        print_diagnostics: true

        publish_tf: true
        publish_acceleration: false
        reset_on_time_jump: true

        map_frame:       map
        odom_frame:      odom
        base_link_frame: base_footprint
        world_frame:     odom

        # ── Odométrie du plugin planar_move ──────────────────
        # CORRECTION : seulement odom0, IMU supprimé car absent du robot
        odom0: odom
        #        [x_pos , y_pos , z_pos,
        #         roll  , pitch , yaw,
        #         x_vel , y_vel , z_vel,
        #         r_vel , p_vel , yaw_vel,
        #         x_acc , y_acc , z_acc]
        odom0_config: [true,  true,  false,
                       false, false, true,
                       true,  true,  false,
                       false, false, true,
                       false, false, false]

        odom0_differential: false

        # IMU supprimé — votre robot n'a pas d'IMU physique
        # Si vous ajoutez un IMU plus tard, décommentez ces lignes :
        # imu0: imu/data
        # imu0_config: [false, false, false,
